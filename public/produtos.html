<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu ERP | Produtos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="produtos">
    <div class="app-shell">
      <aside class="sidebar">
        <div><p class="eyebrow">Meu ERP</p><h2 class="sidebar__title">Menu</h2></div>
        <nav class="sidebar__nav">
          <a class="sidebar__link" href="/dashboard.html">Dashboard</a>
          <a class="sidebar__link is-active" href="/produtos.html">Produtos</a>
          <a class="sidebar__link" href="/clientes.html">Clientes</a>
          <a class="sidebar__link" href="/fornecedores.html">Fornecedores</a>
          <a class="sidebar__link" href="/usuarios.html">Usuarios</a>
          <a class="sidebar__link" href="/plano-contas.html">Plano de contas</a>
          <a class="sidebar__link" href="/compras.html">Compras</a>
          <a class="sidebar__link" href="/vendas.html">Vendas</a>
          <a class="sidebar__link" href="/financeiro.html">Financeiro</a>
        </nav>
      </aside>
      <main class="app-main">
        <header class="topbar">
          <div><p class="eyebrow">Cadastro</p><h1 class="page-title">Produtos</h1></div>
          <div class="row-actions"><strong id="sessionUser">-</strong><button class="button button--ghost" type="button" id="logoutButton">Sair</button></div>
        </header>
        <section class="grid grid--two">
          <article class="panel">
            <div class="panel__header"><h3>Novo produto</h3><p>Cadastro com estoque minimo.</p></div>
            <form id="produtoForm" class="form-stack">
              <input type="text" name="nome" placeholder="Nome do produto" required />
              <input type="text" name="codigo" placeholder="Codigo unico do produto" required />
              <input type="number" step="0.01" min="0" name="preco_custo" placeholder="Preco de custo" required />
              <input type="number" step="0.01" min="0" name="preco_venda" placeholder="Preco de venda" required />
              <input type="number" min="0" name="estoque" placeholder="Estoque inicial" value="0" required />
              <input type="number" min="0" name="estoque_minimo" placeholder="Estoque minimo" value="0" required />
              <button class="button button--primary" type="submit">Salvar produto</button>
            </form>
          </article>
          <article class="panel">
            <div class="panel__header"><h3>Lista de produtos</h3><p>Edite, inative ou exclua registros.</p></div>
            <div class="list" id="produtosList"></div>
          </article>
        </section>
      </main>
    </div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
  </html>
