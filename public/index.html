<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu ERP | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="login">
    <div class="auth-shell">
      <section class="auth-card">
        <div>
          <p class="eyebrow">Micro-ERP academico</p>
          <h1 class="auth-title">Entrar no sistema</h1>
          <p class="hero__text">
            Acesso separado da operacao. Depois do login, cada modulo abre em sua propria tela.
          </p>
        </div>
        <form id="loginForm" class="form-stack">
          <input type="email" name="email" placeholder="Email" required />
          <input type="password" name="senha" placeholder="Senha" required />
          <button class="button button--primary" type="submit">Entrar</button>
        </form>
        <div class="status-card">
          <span class="status-card__label">Acesso inicial</span>
          <strong>admin@microerp.local</strong>
          <p>Senha padrao: admin123</p>
        </div>
      </section>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
  </html>
