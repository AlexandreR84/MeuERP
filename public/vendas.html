<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu ERP | Vendas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="vendas">
    <div class="app-shell">
      <aside class="sidebar">
        <div><p class="eyebrow">Meu ERP</p><h2 class="sidebar__title">Menu</h2></div>
        <nav class="sidebar__nav">
          <a class="sidebar__link" href="/dashboard.html">Dashboard</a>
          <a class="sidebar__link" href="/produtos.html">Produtos</a>
          <a class="sidebar__link" href="/clientes.html">Clientes</a>
          <a class="sidebar__link" href="/fornecedores.html">Fornecedores</a>
          <a class="sidebar__link" href="/usuarios.html">Usuarios</a>
          <a class="sidebar__link" href="/plano-contas.html">Plano de contas</a>
          <a class="sidebar__link" href="/compras.html">Compras</a>
          <a class="sidebar__link is-active" href="/vendas.html">Vendas</a>
          <a class="sidebar__link" href="/financeiro.html">Financeiro</a>
        </nav>
      </aside>
      <main class="app-main">
        <header class="topbar">
          <div><p class="eyebrow">Operacao</p><h1 class="page-title">Vendas</h1></div>
          <div class="row-actions"><strong id="sessionUser">-</strong><button class="button button--ghost" type="button" id="logoutButton">Sair</button></div>
        </header>
        <section class="panel">
          <div class="panel__header"><h3>Registrar venda</h3><p>Baixa estoque, aplica desconto e calcula imposto simples.</p></div>
          <form id="vendaForm" class="form-stack">
            <select id="vendaCliente" name="cliente_id" required>
              <option value="">Selecione o cliente</option>
            </select>
            <input type="number" name="desconto" min="0" step="0.01" placeholder="Desconto da venda" value="0" />
            <div id="vendaItens" class="line-items"></div>
            <div class="row-actions">
              <button class="button button--ghost" type="button" id="addVendaItem">Adicionar item</button>
              <button class="button button--primary" type="submit">Registrar venda</button>
            </div>
          </form>
        </section>
        <template id="vendaItemTemplate">
          <div class="line-item" data-kind="venda">
            <select name="produto_id" required></select>
            <input type="number" name="quantidade" min="1" step="1" placeholder="Qtd." required />
            <div class="line-item__hint" data-price-hint>Preco atual: R$ 0,00</div>
            <button class="icon-button" type="button" data-remove-item>Remover</button>
          </div>
        </template>
      </main>
    </div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
  </html>
